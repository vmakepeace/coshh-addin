<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COSHH Recommendations</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1F497D;
      --accent-light: #EEF3F9;
      --accent-mid: #2E75B6;
      --border: #D0D0D0;
      --border-light: #E8E8E8;
      --text: #1a1a1a;
      --text-2: #555;
      --text-3: #999;
      --bg: #F5F5F5;
      --surface: #FFFFFF;
      --success: #1a4a2e;
      --success-light: #E8F0EB;
      --radius: 4px;
    }

    html, body {
      height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--accent);
      color: white;
      padding: 10px 12px 8px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
    .header p  { font-size: 11px; opacity: 0.65; margin-top: 1px; }

    /* ── Controls bar ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 5px 8px 5px 26px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent-mid); background: white; }
    .search-wrap input::placeholder { color: var(--text-3); }
    .search-icon {
      position: absolute; left: 7px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
      width: 13px; height: 13px;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .filter-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── List ── */
    .list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      padding: 10px 0 4px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sec-all-btn {
      background: none; border: none; font-family: inherit;
      font-size: 10px; color: var(--text-3); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
      padding: 0;
    }
    .sec-all-btn:hover { color: var(--accent); }

    .rec-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
    }
    .rec-row:last-child { border-bottom: none; }
    .rec-row:hover { background: var(--accent-light); margin: 0 -4px; padding-left: 4px; padding-right: 4px; border-radius: var(--radius); }

    .cb {
      width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px;
      border: 1.5px solid var(--border);
      border-radius: 2px; background: white;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-row.checked .cb {
      background: var(--accent);
      border-color: var(--accent);
    }
    .cb-tick { display: none; }
    .rec-row.checked .cb-tick { display: block; }

    .rec-text { font-size: 12px; line-height: 1.5; color: var(--text); flex: 1; }
    .rec-tag {
      font-size: 10px; font-weight: 600;
      padding: 1px 5px; border-radius: 8px;
      background: var(--accent-light);
      color: var(--accent);
      flex-shrink: 0; margin-top: 1px;
      letter-spacing: 0.02em;
    }

    .empty-msg {
      text-align: center;
      color: var(--text-3);
      font-size: 12px;
      padding: 24px 0;
    }

    /* ── Footer ── */
    .footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .footer-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sel-count {
      font-size: 11px;
      color: var(--text-2);
    }
    .sel-count strong { color: var(--accent); }
    .footer-btns { display: flex; gap: 6px; }
    .btn-clear {
      font-family: inherit; font-size: 11px;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 5px 10px;
      color: var(--text-2); cursor: pointer;
    }
    .btn-clear:hover { border-color: var(--text-2); color: var(--text); }

    .btn-insert {
      font-family: inherit; font-size: 12px; font-weight: 600;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius);
      padding: 7px 14px; cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn-insert:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-insert:not(:disabled):hover { opacity: 0.88; }
    .btn-insert:not(:disabled):active { opacity: 0.75; }

    /* ── Status message ── */
    .status {
      font-size: 11px;
      padding: 5px 8px;
      border-radius: var(--radius);
      display: none;
      text-align: center;
    }
    .status.ok   { display: block; background: var(--success-light); color: var(--success); }
    .status.err  { display: block; background: #FDECEA; color: #8B1A1A; }
  </style>
</head>
<body>
<div class="layout">

  <div class="header">
    <h1>COSHH Flour Dust — Recommendations</h1>
    <p>Select and insert into report at cursor position</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 13 13" fill="none">
        <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="7.5" y1="7.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search" placeholder="Search recommendations…" oninput="render()">
    </div>
    <div class="filter-row" id="filters"></div>
  </div>

  <div class="list-wrap" id="list-wrap">
    <div id="rec-list"></div>
    <div class="empty-msg" id="empty-msg" style="display:none;">No recommendations match.</div>
  </div>

  <div class="footer">
    <div class="footer-info">
      <span class="sel-count" id="sel-count"><strong>0</strong> selected</span>
      <div class="footer-btns">
        <button class="btn-clear" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <div class="status" id="status"></div>
    <button class="btn-insert" id="insert-btn" disabled onclick="insertIntoWord()">
      Insert into document
    </button>
  </div>

</div>

<script>
  const CATS = [
    { id: "all",    label: "All" },
    { id: "LEV",    label: "LEV" },
    { id: "Task",   label: "Task-specific" },
    { id: "RPE",    label: "RPE" },
    { id: "PPE",    label: "PPE & Skin" },
    { id: "Maint",  label: "Maintenance" },
    { id: "Clean",  label: "Cleaning" },
    { id: "Health", label: "Health surv." },
    { id: "Train",  label: "Training" },
    { id: "Exp",    label: "Exposure" },
    { id: "AG",     label: "Agriculture" },
  ];

  let activeFilter = "all";
  let selected = new Set();

  // ── Filters ─────────────────────────────────────────────────────
  function buildFilters() {
    const el = document.getElementById("filters");
    el.innerHTML = CATS.map(c =>
      `<button class="filter-btn${activeFilter === c.id ? " active" : ""}"
        onclick="setFilter('${c.id}')">${c.label}</button>`
    ).join("");
  }

  function setFilter(id) {
    activeFilter = id;
    buildFilters();
    render();
  }

  // ── Render list ──────────────────────────────────────────────────
  function getVisible() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    return RECOMMENDATIONS.filter(r => {
      const catOk  = activeFilter === "all" || r.cat === activeFilter;
      const textOk = !q || r.text.toLowerCase().includes(q) || r.sec.toLowerCase().includes(q);
      return catOk && textOk;
    });
  }

  function render() {
    const visible = getVisible();
    const listEl  = document.getElementById("rec-list");
    const emptyEl = document.getElementById("empty-msg");

    if (visible.length === 0) {
      listEl.innerHTML = "";
      emptyEl.style.display = "block";
      updateFooter();
      return;
    }
    emptyEl.style.display = "none";

    // Group by section
    const sections = {};
    visible.forEach(r => {
      if (!sections[r.sec]) sections[r.sec] = [];
      sections[r.sec].push(r);
    });

    listEl.innerHTML = Object.entries(sections).map(([sec, recs]) => {
      const allChecked = recs.every(r => selected.has(r.id));
      const rows = recs.map(r => {
        const chk = selected.has(r.id);
        return `<div class="rec-row${chk ? " checked" : ""}" onclick="toggle(${r.id})">
          <div class="cb">
            <svg class="cb-tick" width="9" height="9" viewBox="0 0 9 9" fill="none">
              <polyline points="1,4.5 3.5,7 8,1.5" stroke="white" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="rec-text">${r.text}</span>
          ${activeFilter === "all" ? `<span class="rec-tag">${r.cat}</span>` : ""}
        </div>`;
      }).join("");

      return `<div>
        <div class="section-label">
          <span>${sec}</span>
          <button class="sec-all-btn"
            onclick="toggleSection('${sec.replace(/'/g, "\\'")}', ${allChecked})">
            ${allChecked ? "None" : "All"}
          </button>
        </div>
        ${rows}
      </div>`;
    }).join("");

    updateFooter();
  }

  function toggle(id) {
    selected.has(id) ? selected.delete(id) : selected.add(id);
    render();
  }

  function toggleSection(sec, wasAll) {
    getVisible().filter(r => r.sec === sec).forEach(r =>
      wasAll ? selected.delete(r.id) : selected.add(r.id)
    );
    render();
  }

  function clearAll() {
    selected.clear();
    render();
    hideStatus();
  }

  function updateFooter() {
    const n = selected.size;
    document.getElementById("sel-count").innerHTML =
      `<strong>${n}</strong> selected`;
    document.getElementById("insert-btn").disabled = n === 0;
  }

  // ── Insert into Word ─────────────────────────────────────────────
  async function insertIntoWord() {
    const items = RECOMMENDATIONS.filter(r => selected.has(r.id));
    if (items.length === 0) return;

    // Check Office.js is available
    if (typeof Word === "undefined") {
      showStatus("err", "Office.js not loaded — try closing and reopening the task pane.");
      return;
    }

    // Group selected items by section, preserving order
    const sections = {};
    const secOrder = [];
    items.forEach(r => {
      if (!sections[r.sec]) { sections[r.sec] = []; secOrder.push(r.sec); }
      sections[r.sec].push(r.text);
    });

    try {
      await Word.run(async (context) => {
        const selection = context.document.getSelection();
        selection.load("font/name,font/size");
        await context.sync();

        const fontName = selection.font.name;
        const fontSize = selection.font.size;

        let last = selection;

        secOrder.forEach((sec, si) => {
          if (si > 0) {
            const spacer = last.insertParagraph("", "After");
            spacer.font.name = fontName;
            spacer.font.size = fontSize;
            last = spacer;
          }
          sections[sec].forEach(text => {
            const para = last.insertParagraph(text, "After");
            para.font.name = fontName;
            para.font.size = fontSize;
            last = para;
          });
        });

        await context.sync();
      });

      showStatus("ok", `${items.length} recommendation${items.length > 1 ? "s" : ""} inserted.`);

    } catch (err) {
      console.error(err);
      showStatus("err", "Error: " + (err.message || err.code || "unknown — see browser console"));
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = "status " + type;
    el.textContent = msg;
    if (type === "ok") setTimeout(hideStatus, 4000);
  }

  function hideStatus() {
    const el = document.getElementById("status");
    el.className = "status";
  }
</script>
<script src="recommendations.js" type="text/javascript"></script>
<script type="text/javascript">
  Office.onReady(function(info) {
    buildFilters();
    render();
  });
</script>
</body>
</html>
